<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <title>DevTickets | Agile Board</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation Sidebar/Top Bar -->
    <header class="app-header">
        <div class="header-container">
            <div class="brand">
                <div class="brand-icon"><i class="fa-solid fa-code-branch"></i></div>
                <h1>DevTickets</h1>
            </div>
            
            <div class="header-controls">
                <div id="systemStatus" class="status-indicator" title="System Status: Checking...">
                    <span class="status-dot"></span>
                    <span class="status-text">System OK</span>
                </div>
                <button class="btn btn-primary" onclick="openTicketModal()"><i class="fa-solid fa-plus"></i> New Ticket</button>
                <div class="user-profile">
                    <button class="icon-btn" onclick="toggleTheme()" title="Toggle Theme"><i class="fa-solid fa-moon" id="themeIcon"></i></button>
                    <button class="icon-btn" onclick="syncData()" title="Sync Data"><i class="fa-solid fa-rotate"></i></button>
                    <button class="icon-btn" id="logoutBtn" onclick="logout()" title="Logout" style="display: none;"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Board Area -->
    <main class="board-container">
        <!-- To Do Column -->
        <section class="column" data-status="To Do">
            <div class="column-header">
                <h2 class="column-title">To Do <span class="ticket-count" id="count-todo">0</span></h2>
            </div>
            <div class="column-body" id="col-todo" ondrop="drop(event)" ondragover="allowDrop(event)">
                <!-- Tickets render here -->
            </div>
        </section>

        <!-- In Progress Column -->
        <section class="column" data-status="In Progress">
            <div class="column-header">
                <h2 class="column-title">In Progress <span class="ticket-count" id="count-inprogress">0</span></h2>
            </div>
            <div class="column-body" id="col-inprogress" ondrop="drop(event)" ondragover="allowDrop(event)">
                <!-- Tickets render here -->
            </div>
        </section>

        <!-- Done Column -->
        <section class="column" data-status="Done">
            <div class="column-header">
                <h2 class="column-title">Done <span class="ticket-count" id="count-done">0</span></h2>
            </div>
            <div class="column-body" id="col-done" ondrop="drop(event)" ondragover="allowDrop(event)">
                <!-- Tickets render here -->
            </div>
        </section>
    </main>

    <!-- Ticket Modal -->
    <div id="ticketModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Create Ticket</h3>
                <button class="icon-btn close-modal" onclick="closeTicketModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="ticketForm" class="modal-body">
                <div class="form-group">
                    <label for="ticketTitle">Title</label>
                    <input type="text" id="ticketTitle" placeholder="e.g. Fix login API bug" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="ticketDescription">Description (Optional)</label>
                    <textarea id="ticketDescription" rows="4" placeholder="Add additional details or steps to reproduce..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group half">
                        <label for="ticketPriority">Priority</label>
                        <select id="ticketPriority">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="form-group half">
                        <label for="ticketAssignee">Assignee</label>
                        <input type="text" id="ticketAssignee" placeholder="e.g. John Doe" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label for="ticketStatus">Status</label>
                    <select id="ticketStatus">
                        <option value="To Do" selected>To Do</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Done">Done</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" onclick="closeTicketModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveTicketBtn">Save Ticket</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="modal-overlay active">
        <div class="modal auth-modal">
            <div class="brand center-brand">
                <div class="brand-icon"><i class="fa-solid fa-code-branch"></i></div>
                <h1>DevTickets</h1>
            </div>
            <p class="auth-subtitle">Sign in to collaborate on tickets</p>
            <form id="authForm" class="modal-body">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required autocomplete="email" placeholder="dev@team.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="authSubmitBtn">Login</button>
                <div class="auth-switch">
                    <span id="authToggleText">Don't have an account? </span>
                    <a href="#" onclick="toggleAuthMode()" id="authToggleBtn">Sign Up</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal-overlay">
        <div class="modal delete-modal">
            <div class="modal-icon-container">
                <div class="modal-icon danger-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
            </div>
            <h3 class="modal-title-center">Delete Ticket?</h3>
            <p class="modal-desc-center">Are you sure you want to delete this ticket? This action cannot be undone.</p>
            <div class="modal-footer center-buttons">
                <button class="btn btn-ghost" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script type="module" src="/js/script.js"></script>
</body>
</html>
